name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, testnet]
    paths:
      - "artifacts/crypto-analyzer/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build + deploy (mainnet)
        if: github.ref_name == 'main'
        working-directory: artifacts/crypto-analyzer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy:mainnet

      - name: Build + deploy (testnet)
        if: github.ref_name == 'testnet'
        working-directory: artifacts/crypto-analyzer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy:testnet
