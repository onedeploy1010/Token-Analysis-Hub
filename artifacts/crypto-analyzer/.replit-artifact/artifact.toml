kind = "web"
previewPath = "/"
title = "Crypto Project Analyzer"
version = "1.0.0"
id = "artifacts/crypto-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19086

[services.development]
run = "pnpm --filter @workspace/crypto-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-analyzer", "run", "build" ]
publicDir = "artifacts/crypto-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19086"
BASE_PATH = "/"
